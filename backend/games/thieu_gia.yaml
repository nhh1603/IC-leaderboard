name: "Thiếu Gia (Bịt Mắt)"
desciption: "Người thừa kế duy nhất — vừa bị cắt toàn bộ di sản, đang mang nợ cờ bạc"
motivation: "Di chúc vừa bị thay đổi hoàn toàn tuần trước, cắt bỏ toàn bộ phần thừa kế. Khoản nợ cờ bạc lớn vừa bị nạn nhân phát hiện."
clues:
  - '"Từ 17:15 đến 18:55 tôi tập guitar trong phòng."  —  Người làm vườn xác nhận nghe tiếng đàn — nhưng tiếng đàn im bặt khoảng 25 phút giữa chừng (khoảng 18:20 – 18:45) rồi mới vang lên lại.'
  - Guitar thiếu dây số 1. Trục vặn của dây bị thiếu vẫn còn ấm — dây vừa mới bị tháo ra chủ động, không phải đứt tự nhiên. Vết cắt mảnh sắc trên đốt ngón tay không giống kiểu thương do dây đàn đứt.
  - Trong túi áo ngoài có mảnh giấy nhỏ ghi kích thước vòng cổ — nét chữ của thiếu gia. Dây guitar số 1 là dây thép mảnh, đủ sắc để tạo vết lằn bầm sâu và mảnh như trên cổ nạn nhân.