name: "Thiếu Gia (Bịt Mắt)"
clues:
  - "Hiếu thừa nhận đã lẻn vào phòng phu nhân để tìm chìa khóa két sắt, nhưng gã thề rằng lúc đó bà đã ngủ rất say, hơi thở khò khè và căn phòng sực nức mùi hoa đỏ."
  - "Đôi giày của Hiếu được tìm thấy ở hành lang thay vì trong phòng gã. Hiếu gào lên rằng gã chưa bao giờ vứt giày lung tung như vậy."
  - "Hiếu đưa cho bạn một bức ảnh cũ giấu sau bức tranh Rock trong phòng. Trong ảnh, một cô gái trẻ trông giống Khoa đang đứng trước lò luyện thép, ánh mắt đầy vẻ tôn sùng di sản gia tộc."