name: "Thiếu Gia (Những kẻ mù quáng)"
desciption: "Người thừa kế duy nhất — vừa bị cắt toàn bộ di sản, đang mang nợ cờ bạc"
motivation: "Di chúc vừa bị thay đổi hoàn toàn tuần trước, cắt bỏ toàn bộ phần thừa kế. Khoản nợ cờ bạc lớn vừa bị nạn nhân phát hiện."
clues:
  - '"Từ 17:15 đến 18:55 tôi tập guitar trong phòng."  —  Người làm vườn xác nhận nghe tiếng đàn — nhưng tiếng đàn im bặt khoảng 25 phút giữa chừng rồi mới vang lên lại. Và không ai xác nhận thấy thiếu gia ở vườn ngay từ lúc mọi người chạy xuống.'
  - Guitar thiếu dây số 1. Trục vặn của dây bị thiếu vẫn còn ấm — dây vừa bị tháo ra chủ động, không phải đứt tự nhiên. Vết cắt mảnh sắc trên đốt ngón tay không giống kiểu thương do dây đứt.
  - Thiếu gia là người cuối cùng trong dòng người đi xuống vườn. Trong túi áo ngoài có một cuộn băng keo đen và một đoạn dây thép nhỏ bị đứt gãy ở hai đầu.
