name: "Hầu Gái (Kí tự hỗn độn)"
desciption: "Cuồng tín với dòng họ — thà chủ nhân chết còn hơn sống trong nhục nhã"
motivation: "Khi biết phu nhân đang bán dần tài sản gia tộc, bà coi đó là sự ô nhục không thể tha. Triết lý: thà chết trong vinh quang."
clues:
  - '"Từ 17:30 đến 18:30 tôi làm việc dọc hành lang Cánh Tây."  —  Đầu bếp thấy bóng đồ xám sẫm lướt qua cửa sau bếp lúc 18:15. Bác sĩ thấy bóng tối lướt nhanh dọc hành lang Tầng 2 lúc 18:25. Cả hai đều là hướng từ Cánh Tây.'
  - '"Lúc 17:00 tôi lau dọn phòng Quản gia."  —  Ngón tay trỏ còn dính vết mực tím chưa rửa sạch. Lịch phân công trực đêm bị sửa bằng đúng loại mực đó.'
  - Trong giỏ giặt có bộ đồng phục xám bị vò nát — kích cỡ nam, không phải của bà — tà áo có vệt ố mùi trà hoa đỏ đặc trưng của phòng nạn nhân.