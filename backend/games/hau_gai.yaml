name: "Hầu Gái (Sắp xếp chữ)"
clues:
  - "Trên đôi găng tay trắng của K có một vết mực màu tím nhỏ xíu ở ngón trỏ. Bà ta giải thích đó là vết mực khi làm sổ sách, nhưng loại mực này có màu sắc rất đặc biệt."
  - "Chiếc khăn tay của K tỏa ra mùi cồn tẩy rửa nồng nặc. Khi bị hỏi, cô nói dùng nó để lau sạch những vết bẩn cứng đầu trên tay nắm cửa phòng Phu nhân."
  - "K khẳng định cửa phòng phu nhân khóa từ bên trong. Tuy nhiên, bạn phát hiện ra ổ khóa đã được tra một lớp dầu trơn nhẵn, khiến chốt cửa có thể tự sập lại chỉ bằng một cái đẩy nhẹ từ bên ngoài."