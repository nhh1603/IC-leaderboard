name: "Đầu Bếp (Tìm Nguyên Liệu)"
desciption: "Đang bị nạn nhân đe dọa tố cáo danh tính thật"
motivation: "Nguyệt San biết ông sống với tên giả để trốn truy nã — vừa đe dọa tố cáo nếu ông không trả nợ."
clues:
  - '"Từ 16:15 đến 18:30 tôi nấu ăn liên tục."  —  Nồi súp nấm cháy khét bên dưới, bằng chứng ông rời bếp đột ngột và lâu trong khung giờ này.'
  - '"Lúc 18:15 tôi thấy một bóng người mặc đồ xám sẫm lướt nhanh qua cửa sau bếp hướng ra nhà kho, dáng đi rất vội."  —  Đây là lần duy nhất có nhân chứng nhìn thấy bóng đen trước khi sự việc xảy ra ở tầng trên.'
  - Dao tinh dầu của ông bị lau sạch bằng cồn y tế rồi vứt thùng rác. Sợi dây dù buộc thịt trong tạp dề cùng loại với sợi chỉ xám vướng ở khe chốt cửa phòng nạn nhân.
