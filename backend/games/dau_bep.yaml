name: "Đầu Bếp (Tìm Nguyên Liệu)"
clues:
  - "Đáy tách trà thảo mộc của phu nhân còn sót lại một lớp váng dầu mỏng, bốc lên mùi thơm nồng đặc của nhụy hoa đỏ nén đặc, che lấp hoàn toàn mùi trà."
  - "Con dao nhỏ chuyên dùng chiết xuất tinh dầu biến mất khỏi giá treo. Sau đó, nó được tìm thấy trong túi rác ngoài sảnh, sạch bong như thể vừa được tẩy rửa bằng cồn."
  - "Anh nghe thấy một tiếng động lạ trong kho thực phẩm lúc 5 giờ chiều: tiếng kim loại va vào nhau lạch cạch và một giọng trầm lẩm bẩm về 'lời thề sắt đá'."
