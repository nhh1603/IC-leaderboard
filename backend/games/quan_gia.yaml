name: "Quản Gia (Bóng Chuyền Phối Hợp)"
clues:
  - "Một vệt trầy xước mới tinh trên móc treo chìa khóa vạn năng trong phòng quản gia. Lớp bụi mỏng vốn có ở đó đã bị lau sạch một cách vội vã."
  - "Bản danh sách phân công trực đêm có vết mực tím đè lên giờ giấc cũ. Thời gian quét dọn hành lang cánh Tây bị đẩy lên sớm hơn 30 phút so với mọi ngày."
  - "Trong túi áo của Sơn có một mẩu giấy ghi chú: 'Hãy chuẩn bị cho sự kết thúc của những ống khói'. Chữ viết tay run rẩy, giống hệt nét chữ của Phu nhân."
