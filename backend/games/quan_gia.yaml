name: "Quản Gia (Bản giao hưởng lỗi nhịp)"
desciption: "30 năm phục vụ — vừa bị xóa khỏi di chúc tuần trước"
motivation: "Bị xóa tên khỏi di chúc sau 30 năm phục vụ mà không có lời giải thích."
clues:
  - '"Lúc 17:00 tôi để chìa khóa vạn năng trên bàn 10 phút để đi kiểm tra kho rượu."  —  Kho rượu đang ngập nước từ sáng, không thể vào được. Chìa khóa có vết xước mới tinh.'
  - '"Từ 18:00 đến 18:50 tôi túc trực ở Sảnh Tiệc Tầng 1."  —  Một nhân viên phục vụ không thấy ông ở đó trong khoảng 18:20 – 18:40.'
  - Lịch phân công trực đêm bị sửa bằng mực tím — kéo dài thời gian hành lang Tầng 2 vắng người. Lọ mực tím rỉ nắp ngay trên bàn ông, nhưng nét chữ sửa không phải của ông.
