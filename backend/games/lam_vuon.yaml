name: "Làm Vườn (6 Chân)"
clues:
  - "Dấu giày cỡ 42 (loại của Thiếu gia) in dưới bùn ban công. Khoảng cách giữa các bước chân cực kỳ đều nhau,"
  - "Bụi hoa đỏ quý hiếm bị cắt trộm nhụy vào lúc rạng sáng. Vào giờ đó, Huy luôn đi kiểm tra hệ thống tưới nước ở phía đối diện khu vườn."
  - "Một chiếc khuy áo trắng vướng trên gai hoa hồng. Sợi chỉ đứt còn rất mới, nhưng nó nằm ở vị trí cao quá tầm với của một người đang bò từ dưới đất lên ban công."