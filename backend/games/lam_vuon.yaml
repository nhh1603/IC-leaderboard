name: "Làm Vườn (Những bước chân đồng nhất)"
desciption: "Khu vườn 200 tuổi — di sản cha truyền — vừa bị ký lệnh bê tông hóa"
motivation: "Nguyệt San vừa ký phá bỏ khu vườn 200 tuổi để xây bãi đậu xe — xóa sổ công trình cả đời ông."
clues:
  - '"Lúc 18:00 tôi tưới cây dưới ban công phòng nạn nhân — nghe tiếng lạch cạch kim loại trên cao."  —  Vết ủng ông in trước dưới ban công, vết giày đế nhỏ sạch hơn đè lên sau.'
  - '"Sau đó tôi về phòng chợp mắt một lát, tiếng guitar ồn quá."  —  Giường trong phòng ông không có vết nằm, gối thẳng nguyên. Tiếng guitar im bặt 25 phút giữa chừng — vậy ông nghe thấy tiếng guitar lúc nào?'
  - Dây thép gai uốn cây trong túi ông có đường kính tương đương vết lằn bầm mảnh và sâu trên cổ nạn nhân.