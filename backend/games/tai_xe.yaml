name: "Tài Xế (Mê cung ký ức)"
desciption: "Người bảo lãnh nợ cờ bạc cho thiếu gia — đang bị dọa phá sản"
motivation: "Nguyệt San phát hiện ông bảo lãnh khoản nợ cá độ của thiếu gia và đang dọa sa thải lẫn kiện ra tòa."
clues:
  - '"Đúng 19:00 tôi đứng ở gara, nhìn lên thấy một bóng đen từ ban công rơi xuống vườn hoa đỏ."  —  Điếu thuốc rơi tại chỗ chưa hề được châm lửa. Và không ai tìm thấy người nào dưới vườn cả.'
  - '"Từ 16:00 đến 18:00 tôi ở gara sửa xe."  —  Người làm vườn thấy ông trong phòng khách lúc 18:30, tay đang rút phích cắm camera an ninh chĩa ra vườn.'
  - Khi mọi người xuống vườn lúc 19h04 thì lúc 19h08 mới thấy tài xế xuất hiện quanh vườn - dù cho đã nói là 19h00 ở dưới gara sẵn. Trong cốp xe có tờ nợ cá độ mang tên thiếu gia với chữ ký bảo lãnh của ông. Lõi đồng dây điện trần quanh hông có đường kính tương đương vết lằn bầm trên cổ nạn nhân.
