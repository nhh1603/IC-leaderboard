name: "Tài Xế (Mê Cung)"
clues:
  - "Minh xác nhận đã chở một người lạ đến cổng sau lúc chiều, nhưng khi kiểm tra ghế sau, Minh thấy một chiếc khăn tay bị bỏ quên"
  - "Trong cốp xe của Minh có một tờ hóa đơn nợ cá độ khổng lồ của Thiếu gia Hiếu. Tờ hóa đơn được đặt ở vị trí rất dễ thấy."
  - "Minh khai rằng lúc 11 giờ đêm, anh thấy một bóng người đi lướt qua rừng. Dáng đi của người đó rất thẳng, vững chãi và chuyên nghiệp."