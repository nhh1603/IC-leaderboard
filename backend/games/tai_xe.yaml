name: "Tài Xế (Mê Cung)"
desciption: "Người bảo lãnh nợ cờ bạc cho thiếu gia — đang bị dọa phá sản"
motivation: "Nguyệt San phát hiện ông bảo lãnh khoản nợ cá độ của thiếu gia và đang dọa sa thải lẫn kiện ra tòa."
clues:
  - '"Đúng 19:00 tôi đứng ở gara hút thuốc, thấy bóng đen nhảy xuống từ ban công."  —  Điếu thuốc rơi tại chỗ chưa hề được châm lửa. Ông là người duy nhất xác nhận "thấy" bóng đen tẩu thoát.'
  - '"Từ 16:00 đến 18:00 tôi ở gara sửa xe."  —  Người làm vườn thấy ông trong phòng khách lúc 18:30, tay đang rút phích cắm camera an ninh chĩa ra vườn.'
  - Trong cốp xe có tờ nợ cá độ mang tên thiếu gia với chữ ký bảo lãnh của ông. Lõi đồng dây điện trần quanh hông có đường kính tương đương vết lằn trên cổ nạn nhân.