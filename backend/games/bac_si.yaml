name: "Bác Sĩ (Cán cân định mệnh)"
desciption: "Đang bị nạn nhân nắm bí mật về thuốc cấm"
motivation: "Nguyệt San biết ông dùng thuốc cấm chữa cho bệnh nhân khác. Hai người đang trong thế giằng co — ông bao che bệnh tình của bà, bà giữ im lặng về thuốc của ông."
clues:
  - '"Từ 17:00 đến 18:00 tôi ở Phòng Khám."  —  17:45 không ai nhấc máy khi Quản gia gọi đến. Lúc 18:25, đang đi dọc hành lang Tầng 2, ông thoáng thấy một bóng tối lướt nhanh từ hướng phòng phu nhân — nghĩ là nhân viên bình thường nên không để ý.'
  - '"19:00 vào kiểm tra thấy nạn nhân hôn mê. 19:10 quay lại thì bà đã mất."  —  10 phút đó ông ở lại một mình với nạn nhân trước khi tuyên bố tử vong.'
  - Thuốc gây mê liều cao (danh mục cấm) trong tủ mất một nửa so với hôm qua — ổ khóa không bị phá nhưng có vết xước mới. Ống tiêm rỗng dưới gầm tủ không có vân tay của ông.