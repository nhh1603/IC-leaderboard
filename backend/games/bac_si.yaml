name: "Bác Sĩ (Cân Đá)"
clues:
  - "Bác sĩ xác nhận lọ thuốc an thần của phu nhân bị đánh tráo. Thuốc bên trong vẫn là thuốc ngủ, nhưng nồng độ đã bị pha loãng, không đủ để gây chết người nhưng đủ để làm nạn nhân mê man."
  - "Thành phát hiện bộ blouse dự phòng của mình trong phòng giặt là bị mất một chiếc khuy áo. Ông nhớ rõ là mình đã để nó ở đó từ sáng sớm."
  - "Kết quả xét nghiệm sơ bộ: Phu nhân chết vì ngạt khí do phản ứng hóa học giữa tinh dầu hoa nồng độ cao và chất giãn cơ trong trà. Một cái chết êm ái nhưng cực kỳ tinh vi."